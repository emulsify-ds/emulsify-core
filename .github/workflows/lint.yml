# Runs the project lint task on pushes and pull requests that target release branches.
name: Lint
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 20
      - name: Install
        # npm install validates the package the same way consumers install it.
        run: npm install
      - name: Lint
        run: npm run lint
