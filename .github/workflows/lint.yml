# Runs release-readiness checks on pushes and pull requests that target release branches.
name: CI
on:
  push:
    branches: [4.x, develop, main]
  pull_request:
    branches: [4.x, develop, main]
jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install
        # npm install validates the package the same way consumers install it.
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Storybook build
        run: npm run storybook-build
      - name: Fixture builds
        run: npm run fixtures:release
