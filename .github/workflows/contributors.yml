# Regenerates contributor acknowledgements after maintained branch updates.
name: Add contributors
on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  add-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CONTRIBUTORS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install all-contributors-cli
        run: npm install -g all-contributors-cli

      - name: Generate contributors
        # Commit generated README changes back from the GitHub Actions identity.
        run: |
          all-contributors generate
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
          git add README.md
          git commit -m "docs: update contributors" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.CONTRIBUTORS_TOKEN }}
