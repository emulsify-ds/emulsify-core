# Adds newly opened issues and pull requests to the shared Emulsify project board.
name: Add to projects

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

jobs:
  add-to-project:
    name: Add issue to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v0.3.0
        with:
          # Keep triage in the organization-level project used by maintainers.
          project-url: https://github.com/orgs/emulsify-ds/projects/6
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
